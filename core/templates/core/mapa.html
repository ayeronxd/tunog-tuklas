<!DOCTYPE html>
{% load static socialaccount %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa ng Letra - Tunog Tuklas</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'core/tuklas.css' %}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,800;0,900;1,400&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="map-app" class="d-flex flex-column min-vh-100 position-relative map-bg">

        <!-- Top Header Bar -->
        <header class="map-header w-100 d-flex justify-content-between align-items-center p-3 p-md-4">
            <!-- Back Button -->
            <button class="btn btn-map-nav text-danger bg-white shadow-sm" @click="goBack">
                <i class="fa-solid fa-chevron-left fs-4"></i>
            </button>

            <!-- Title -->
            <h1 class="text-white text-center flex-grow-1 m-0 header-title map-title mx-3">
                Aking Mapa ng mga Letra
            </h1>

            <!-- Profile & Logout Dropdown -->
            <div class="dropdown">
                <button class="btn btn-map-nav bg-white p-0 overflow-hidden shadow-sm d-flex align-items-center justify-content-center mx-2" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--border-dark);">
                    {% get_social_accounts user as accounts %}
                    {% if accounts.google %}
                        <img src="{{ accounts.google.0.get_avatar_url }}" alt="Profile" style="width: 100%; height: 100%; object-fit: cover;">
                    {% else %}
                        <i class="fa-solid fa-user fs-3 text-secondary"></i>
                    {% endif %}
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow-lg rounded-4 overflow-hidden mt-3 p-0" style="border: 3px solid var(--border-dark) !important; min-width: 250px;">
                    <li class="px-4 py-3 text-center bg-light" style="border-bottom: 2px solid var(--border-dark);">
                        <strong class="d-block fs-5 text-dark fw-bold mb-1">{{ request.user.first_name|default:request.user.username }}</strong>
                        <small class="text-muted fw-semibold">{{ request.user.email }}</small>
                    </li>
                    <li>
                        <form method="post" action="{% url 'account_logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item text-danger py-3 fw-bold d-flex align-items-center justify-content-center gap-2" style="font-size: 1.1rem; transition: background-color 0.2s;">
                                <i class="fa-solid fa-right-from-bracket"></i> Mag-logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="container-fluid flex-grow-1 position-relative p-0 overflow-hidden">

            <!-- Progress Pill -->
            <div class="position-absolute top-0 start-0 m-4 z-2">
                <div
                    class="progress-pill bg-white px-4 py-2 rounded-pill d-flex align-items-center gap-3 border border-2 border-info shadow-sm">
                    <i class="fa-solid fa-star text-warning fs-4"></i>
                    <span class="fs-4 fw-bold">15 <span class="fs-6 text-muted ms-1 fw-semibold">Stars</span></span>
                    <span class="fs-5 fw-bold text-info border-start border-2 ps-3">3/16</span>
                </div>
            </div>

            <!-- Path Canvas Layer (SVG) -->
            <svg class="map-path-canvas position-absolute top-0 start-0 w-100 h-100 z-0"
                preserveAspectRatio="xMidYMid slice">
                <!-- Connectors between nodes (Approximate path based on original layout) -->
                <!-- First row -->
                <path d="M 20% 30% Q 25% 25% 30% 28% T 40% 30% T 50% 35% T 60% 35% T 70% 38% T 75% 45%" fill="none"
                    class="path-line-active" />

                <!-- Second row curve down -->
                <path d="M 75% 45% Q 78% 55% 70% 60% T 60% 58% T 50% 60% T 40% 60% T 30% 65% T 25% 70%" fill="none"
                    class="path-line-inactive" />

                <!-- Third row curve right -->
                <path d="M 25% 70% Q 25% 80% 35% 80% T 50% 75% T 75% 85%" fill="none" class="path-line-inactive" />
            </svg>

            <!-- Interactive Map Wrapper -->
            <div class="map-nodes-container position-absolute top-0 start-0 w-100 h-100 z-1">

                <!-- Completed Nodes (Teal) -->
                <!-- We calculate approx absolute percents based on screenshot -->

                <div class="map-node node-completed" style="top: 30%; left: 20%;">
                    <div class="node-circle position-relative">M
                        <div class="star-badge position-absolute top-0 start-100 translate-middle"><i
                                class="fa-solid fa-star fs-6 text-warning"></i></div>
                    </div>
                </div>

                <div class="map-node node-completed" style="top: 25%; left: 28%;">
                    <div class="node-circle position-relative">I
                        <div class="star-badge position-absolute top-0 start-100 translate-middle"><i
                                class="fa-solid fa-star fs-6 text-warning"></i></div>
                    </div>
                </div>

                <div class="map-node node-completed" style="top: 32%; left: 35%;">
                    <div class="node-circle position-relative">O
                        <div class="star-badge position-absolute top-0 start-100 translate-middle"><i
                                class="fa-solid fa-star fs-6 text-warning"></i></div>
                    </div>
                </div>

                <!-- Current Active Node (Orange) -->
                <div class="map-node node-active" style="top: 28%; left: 45%;">
                    <div class="node-wrapper d-flex flex-column align-items-center">
                        <div class="node-active-ring"></div>
                        <div class="node-circle bg-warning text-white border-orange">B</div>
                        <div
                            class="active-indicator text-orange fw-bold mt-2 small d-flex flex-column align-items-center">
                            <i class="fa-solid fa-arrow-up fs-6"></i>
                            <span>Dito ka na!</span>
                        </div>
                    </div>
                </div>

                <!-- Upcoming Locked Nodes (Gray) -->
                <div class="map-node node-locked" style="top: 35%; left: 55%;">
                    <div class="node-circle">E<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 32%; left: 62%;">
                    <div class="node-circle">U<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 35%; left: 69%;">
                    <div class="node-circle">T<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 38%; left: 76%;">
                    <div class="node-circle">K<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>

                <!-- Second Row (Leftwards) -->
                <div class="map-node node-locked" style="top: 48%; left: 72%;">
                    <div class="node-circle">L<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 52%; left: 65%;">
                    <div class="node-circle">Y<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 50%; left: 58%;">
                    <div class="node-circle">N<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 53%; left: 51%;">
                    <div class="node-circle">G<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 48%; left: 44%;">
                    <div class="node-circle">Ng<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 52%; left: 37%;">
                    <div class="node-circle">P<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 50%; left: 30%;">
                    <div class="node-circle">R<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>

                <!-- Third Row (Rightwards) -->
                <div class="map-node node-locked" style="top: 60%; left: 24%;">
                    <div class="node-circle">D<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 70%; left: 28%;">
                    <div class="node-circle">H<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>
                <div class="map-node node-locked" style="top: 75%; left: 35%;">
                    <div class="node-circle">W<i class="fa-solid fa-lock lock-icon"></i></div>
                </div>

            </div>

            <!-- Floating Continue Action -->
            <div class="position-absolute bottom-0 start-50 translate-middle-x mb-5 z-3">
                <button class="btn btn-game-orange fs-4 px-5 py-3 rounded-pill fw-bold border-3 shadow-lg continue-btn"
                    @click="continueLetter">
                    Ituloy ang Letrang B
                </button>
            </div>

        </main>
    </div>

    <!-- Vue 3 JS (Global Build) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Bootstrap 5 JS (Required for Dropdown) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Map JS -->
    <script src="{% static 'core/mapa.js' %}"></script>
</body>

</html>
